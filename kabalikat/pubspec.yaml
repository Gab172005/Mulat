name: kabalikat
description: "Kabalikat - An offline-first AI study companion for Filipino learners."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  provider: ^6.1.2
  shared_preferences: ^2.2.3
  connectivity_plus: ^6.0.3
  http: ^1.2.1
  cupertino_icons: ^1.0.6
  file_picker: ^11.0.2
  syncfusion_flutter_pdf: ^33.2.13
  uuid: ^4.5.3
  google_fonts: ^8.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
