<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7c3aed" />
      <stop offset="50%" stop-color="#6366f1" />
      <stop offset="100%" stop-color="#4f46e5" />
    </linearGradient>
    <!-- Glow Effect -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="16" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  
  <!-- Rounded Base Background -->
  <rect width="512" height="512" rx="128" fill="url(#bg-grad)" />
  
  <!-- Outer Decorative Ring -->
  <circle cx="256" cy="256" r="210" fill="none" stroke="rgba(255, 255, 255, 0.12)" stroke-width="8" stroke-dasharray="16 12" />
  
  <!-- Glowing Emblems (Book + AI Sparks) -->
  <g filter="url(#glow)">
    <!-- Book Shape -->
    <path d="M140 180c0-22.1 17.9-40 40-40h76v240h-76c-22.1 0-40-17.9-40-40V180z" fill="#ffffff" opacity="0.9" />
    <path d="M372 180c0-22.1-17.9-40-40-40h-76v240h-76c0 22.1 17.9 40 40 40h112c22.1 0 40-17.9 40-40V180z" fill="#f5f3ff" />
    
    <!-- Spine Lines / Pages Detail -->
    <line x1="256" y1="140" x2="256" y2="380" stroke="#e0e7ff" stroke-width="4" stroke-linecap="round" />
    <path d="M180 340c20 0 50 15 76 25 26-10 56-25 76-25" fill="none" stroke="#6366f1" stroke-width="8" stroke-linecap="round" />
    
    <!-- AI Brain Waves / Nodes -->
    <!-- Center Node -->
    <circle cx="256" cy="210" r="16" fill="#8b5cf6" />
    
    <!-- Connection lines -->
    <path d="M256 210 L190 200 M256 210 L322 200 M256 210 L210 270 M256 210 L302 270" stroke="#ffffff" stroke-width="4" stroke-linecap="round" opacity="0.8" />
    
    <!-- Brain Nodes -->
    <circle cx="190" cy="200" r="12" fill="#3b82f6" />
    <circle cx="322" cy="200" r="12" fill="#ec4899" />
    <circle cx="210" cy="270" r="12" fill="#10b981" />
    <circle cx="302" cy="270" r="12" fill="#f59e0b" />
  </g>
  
  <!-- Subtle emblem details -->
  <path d="M190 200 L180 170 M322 200 L332 170" stroke="#ffffff" stroke-width="2" opacity="0.5"/>
</svg>
